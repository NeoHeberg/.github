name: 📊 Dynamiques NeoHeberg

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-graph:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIVITY_GRAPH_TOKEN }}

      - name: 🐍 Générer tous les SVG
        env:
          GH_TOKEN: ${{ secrets.ACTIVITY_GRAPH_TOKEN }}
        run: python3 generate_org_dynamics.py

      - name: 📤 Commiter les changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/activity-graph.svg profile/org-stats.svg profile/org-languages.svg
          git diff --staged --quiet || (git commit -m "📊 Mise à jour des graphiques de l'organisation" && git push)

      - name: 🔄 Cache bust README
        run: |
          TODAY=$(date +%Y%m%d)
          sed -i "s|activity-graph.svg?v=[0-9]*|activity-graph.svg?v=$TODAY|g" profile/README.md
          sed -i "s|org-stats.svg?v=[0-9]*|org-stats.svg?v=$TODAY|g" profile/README.md
          sed -i "s|org-languages.svg?v=[0-9]*|org-languages.svg?v=$TODAY|g" profile/README.md
          git add profile/README.md
          git diff --staged --quiet || (git commit -m "🔄 Cache bust $TODAY" && git push)